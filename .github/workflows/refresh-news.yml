name: Refresh MarTech AI news

on:
  schedule:
    # Odd minutes deliberately — on-the-hour slots (esp. 06:00 UTC) are
    # congested on GitHub and runs get delayed or dropped.
    - cron: '23 5 * * *'    # primary: 05:23 UTC daily
    - cron: '23 13 * * *'   # backup: 13:23 UTC, in case the morning run fails
  workflow_dispatch:        # run on demand from the Actions tab

permissions:
  contents: write

concurrency:
  group: refresh-news
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: agent/requirements.txt

      - name: Install dependencies
        run: pip install -r agent/requirements.txt

      - name: Run the agent
        working-directory: agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python agent.py

      - name: Commit updated brief
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- public/martech-news.json; then
            git add public/martech-news.json
            git commit -m "chore: refresh MarTech AI brief ($(date -u +%Y-%m-%d))"
            # Rebase in case you pushed commits while the run was in flight,
            # otherwise the bot's push gets rejected and the refresh is lost.
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          else
            echo "No changes to commit."
          fi